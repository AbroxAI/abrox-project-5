<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Abrox – Profit Hunters Chat</title>

  <!-- widget CSS -->
  <link rel="stylesheet" href="widget.css" />

  <script>
    // ==========================
    // SITE CONFIG
    // ==========================
    window.CONTACT_ADMIN_LINK = "https://t.me/ph_suppp";
    window.MEMBER_COUNT = 1284;
    window.ONLINE_COUNT = 128;

    window.REALISM_CONFIG = {
      TOTAL_PERSONAS: 1200,
      INITIAL_POOL: 400,
      POOL_MIN: 300,
      POOL_MAX: 3000,
      DEDUP_LIMIT: 200000,
      MIN_INTERVAL_MS: 20000,
      MAX_INTERVAL_MS: 60000,
      REACTION_TICK_MS: 30000,
      TREND_SPIKE_PROB: 0.02
    };

    window.JOINER_CONFIG = {
      minIntervalMs: 1000 * 60 * 60 * 6,
      maxIntervalMs: 1000 * 60 * 60 * 24,
      initialJoins: 3,
      welcomeMessage: "Welcome! Please use Contact Admin to verify."
    };
  </script>
</head>

<body>

<div id="tg-comments-app">

  <!-- HEADER -->
  <header class="tg-header" role="banner">
    <button id="tg-back" class="tg-back-btn" aria-label="Back">
      <i data-lucide="arrow-left"></i>
    </button>

    <div class="tg-header-center">
      <img src="assets/logo.jpg" alt="Logo" class="tg-header-avatar" />
      <div class="tg-header-info">
        <div class="tg-title">🌐 Profit Hunters Chat</div>
        <div class="tg-meta" id="tg-meta-line">1,284 members, 128 online</div>
      </div>
    </div>

    <button id="tg-options" class="tg-options-btn" aria-label="Options">
      <i data-lucide="more-vertical"></i>
    </button>
  </header>

  <!-- PIN BANNER -->
  <div id="tg-pin-banner" class="tg-pin-banner hidden" role="region" aria-live="polite"></div>

  <!-- CHAT CONTAINER -->
  <main id="tg-comments-container"
        class="tg-comments-container"
        role="feed"
        aria-live="off"></main>

  <!-- NEW MESSAGE INDICATOR -->
  <div id="tg-jump-indicator" class="hidden" aria-hidden="true">
    <i data-lucide="chevron-down"></i>
    <span id="tg-jump-text">New messages</span>
  </div>

  <!-- INPUT BAR -->
  <div class="tg-input-wrapper" role="form" aria-label="Send a message">
    <div class="tg-input-bar glass locked" id="tg-input-bar">
      <i data-lucide="lock" class="tg-input-lock"></i>
      <span class="tg-input-locked-text">
        Only verified members can send messages
      </span>
    </div>
  </div>

</div>


<!-- ICON LIBRARY -->
<script src="https://unpkg.com/lucide@latest"></script>


<!-- ==========================
     SCRIPT LOAD ORDER
========================== -->

<script src="identity-personas-v7.js"></script>

<script src="bubble-renderer-fixed.js"></script>

<script src="realism-engine-v13-fixed.js"></script>

<script src="interactions.js"></script>

<script src="joiner-simulator.js"></script>

<script src="history-loader.js"></script>

<script src="app.js"></script>


<!-- ==========================
     SAFE INITIALIZATION
========================== -->

<script>
(async function initAllSystems(){

  // initialize icons
  if(window.lucide){
    lucide.createIcons();
  }

  // wait for persona pool
  await window.identity.ready;

  // wait for renderer
  async function waitForRenderer(){
    while(
      !window.TGRenderer ||
      !window.TGRenderer.appendMessage ||
      !window.queuedTyping
    ){
      await new Promise(r=>setTimeout(r,50));
    }
  }

  await waitForRenderer();

  const container = document.getElementById("tg-comments-container");

  // -------------------------
  // LOAD HISTORY FIRST
  // -------------------------
  if(window.historyLoader){
    await window.historyLoader.loadHistory();
  }

  // -------------------------
  // START REALISM ENGINE
  // -------------------------
  if(!window.realism.started){
    window.realism.simulate();
    window.realism.started = true;
  }

  // -------------------------
  // INITIAL JOINERS
  // -------------------------
  if(window.JOINER_CONFIG?.initialJoins && !window.joinerDone){
    const count = window.JOINER_CONFIG.initialJoins;
    await window.joiner.simulateJoins(count);
    window.joinerDone = true;
  }

  // -------------------------
  // ADMIN PIN MESSAGE
  // -------------------------
  if(window.realism.postAdminBroadcast){

    const broadcast = await window.realism.postAdminBroadcast();

    window.realism.postPinNotice?.();

    window.realism.showPinBanner?.(broadcast.image, broadcast.id);

    requestAnimationFrame(()=>{
      container.scrollTop = container.scrollHeight;
    });

  }

  // -------------------------
  // INTERACTIONS READY
  // -------------------------
  if(window.interactions){
    window.interactions.ready = true;
  }

  console.log("✅ Abrox chat systems ready.");

})();
</script>

</body>
</html>
