<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Abrox – Profit Hunters Chat</title>

  <!-- Widget CSS -->
  <link rel="stylesheet" href="widget.css" />

  <style>
    /* =========================
       HEADER TYPING INDICATOR
    ========================== */
    .tg-header-typing {
      font-size: 12px;
      color: #9aa7bd;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .tg-header-typing.hidden { display: none; }
    .typing-dots {
      display: inline-flex;
      gap: 2px;
    }
    .typing-dots span {
      width: 4px;
      height: 4px;
      background: #2ea6ff;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>

  <script>
    // Site configuration
    window.CONTACT_ADMIN_LINK = "https://t.me/ph_suppp";
    window.MEMBER_COUNT = 1284;
    window.ONLINE_COUNT = 128;

    window.REALISM_CONFIG = {
      TOTAL_PERSONAS: 1200,
      INITIAL_POOL: 400,
      POOL_MIN: 300,
      POOL_MAX: 3000,
      DEDUP_LIMIT: 200000,
      MIN_INTERVAL_MS: 20000,
      MAX_INTERVAL_MS: 60000,
      REACTION_TICK_MS: 30000,
      TREND_SPIKE_PROB: 0.02
    };

    window.JOINER_CONFIG = {
      minIntervalMs: 1000 * 60 * 60 * 6,
      maxIntervalMs: 1000 * 60 * 60 * 24,
      initialJoins: 3,
      welcomeMessage: "Welcome! Please use Contact Admin to verify."
    };
  </script>
</head>
<body>
  <div id="tg-comments-app">

    <!-- HEADER -->
    <header class="tg-header" role="banner">
      <button id="tg-back" class="tg-back-btn" aria-label="Back">
        <i data-lucide="arrow-left"></i>
      </button>

      <div class="tg-header-center">
        <img src="assets/logo.jpg" alt="Logo" class="tg-header-avatar" />
        <div class="tg-header-info">
          <div class="tg-title">🌐 Profit Hunters Chat</div>
          <div class="tg-meta" id="tg-meta-line">1,284 members, 128 online</div>
          <!-- Header typing indicator -->
          <div id="tg-header-typing" class="tg-header-typing hidden">
            <span class="typing-names"></span>
            <span class="typing-dots"><span></span><span></span><span></span></span>
          </div>
        </div>
      </div>

      <button id="tg-options" class="tg-options-btn" aria-label="Options">
        <i data-lucide="more-vertical"></i>
      </button>
    </header>

    <!-- PIN BANNER -->
    <div id="tg-pin-banner" class="tg-pin-banner hidden" role="region" aria-live="polite"></div>

    <!-- CHAT CONTAINER -->
    <main id="tg-comments-container" class="tg-comments-container" role="feed" aria-live="off"></main>

    <!-- NEW MESSAGE JUMP INDICATOR -->
    <div id="tg-jump-indicator" class="hidden" aria-hidden="true">
      <i data-lucide="chevron-down"></i>
      <span id="tg-jump-text">New messages</span>
    </div>

    <!-- LOCKED INPUT BAR ONLY -->
    <div class="tg-input-wrapper" role="form" aria-label="Send a message">
      <div class="tg-input-bar glass locked" id="tg-input-bar">
        <i data-lucide="lock" class="tg-input-lock"></i>
        <span class="tg-input-locked-text">Only verified members can send messages</span>
      </div>
    </div>

  </div>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Scripts (original loading order) -->
  <script src="identity-personas.js"></script>
  <script src="bubble-renderer-fixed-v2.js"></script>
  <script src="ultimate-realism-full-v7.13.js"></script>
  <script src="interactions-v14.1-crowd-join-replies-typing-auto-hide.js"></script>
  <script src="app-fixed.js"></script>

  <!-- Initialization + Header Typing -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if(window.lucide?.createIcons) window.lucide.createIcons();
      const inputBar = document.getElementById('tg-input-bar');
      if(inputBar) inputBar.classList.add('locked');

      // Header typing setup
      const headerTyping = document.getElementById('tg-header-typing');
      const typingNames = headerTyping.querySelector('.typing-names');

      const activeTypers = new Map();
      const TYPING_TIMEOUT = 5000; // ms before auto-stop
      const MAX_DISPLAY_NAMES = 3;  // Max names to show in header

      function formatNames(names) {
        if(names.length <= MAX_DISPLAY_NAMES){
          if(names.length === 1) return names[0];
          if(names.length === 2) return names.join(' and ');
          return names.slice(0, -1).join(', ') + ', and ' + names[names.length-1];
        } else {
          const remaining = names.length - MAX_DISPLAY_NAMES;
          return names.slice(0, MAX_DISPLAY_NAMES).join(', ') + `, and ${remaining} other${remaining > 1 ? 's' : ''}`;
        }
      }

      window.headerTypingStart = function(name) {
        if(activeTypers.has(name)) clearTimeout(activeTypers.get(name));
        activeTypers.set(name, setTimeout(() => headerTypingStop(name), TYPING_TIMEOUT));
        updateHeaderTyping();
      };

      window.headerTypingStop = function(name) {
        if(activeTypers.has(name)) {
          clearTimeout(activeTypers.get(name));
          activeTypers.delete(name);
          updateHeaderTyping();
        }
      };

      function updateHeaderTyping() {
        const names = Array.from(activeTypers.keys());
        if(names.length === 0){
          headerTyping.classList.add('hidden');
        } else {
          headerTyping.classList.remove('hidden');
          typingNames.textContent = formatNames(names);
          typingNames.textContent += names.length > 1 ? ' are typing' : ' is typing';
        }
      }

      // Example simulation (remove/comment in production)
      // headerTypingStart('Alice');
      // headerTypingStart('Bob');
      // headerTypingStart('Charlie');
      // headerTypingStart('David');
    });
  </script>
</body>
</html>
